{% if page.meta.comments is not false %}
  <h2 id="__comments">{{ lang.t("meta.comments") }}</h2>
  
  <div id="giscus-container">
    <script src="https://giscus.app/client.js"
          data-repo="leostrange05/leostrange05.github.io"
          data-repo-id="R_kgDOIxy5Lw"
          data-category="Announcements"
          data-category-id="DIC_kwDOIxy5L84C3DF8"
          data-mapping="pathname"
          data-strict="0"
          data-reactions-enabled="1"
          data-emit-metadata="0"
          data-input-position="top"
          data-lang="zh-CN"
          data-loading="lazy"
          crossorigin="anonymous"
          async>
    </script>
  </div>

  <script>
     /* 1. CONFIGURATION: Map MkDocs schemes to Giscus themes */
    const G_THEMES = {
      "default": "light",
      "slate": "dark_dimmed"
    };

    /* 2. LOGIC: Function to send the theme update to the Giscus iframe */
    function syncGiscus() {
      // Get the current scheme from the body attribute (the most direct way)
      const currentScheme = document.body.getAttribute("data-md-color-scheme") || "default";
      const giscusTheme = G_THEMES[currentScheme] || "light";
      
      console.log("Syncing Giscus. Scheme:", currentScheme, "-> Theme:", giscusTheme);

      const iframe = document.querySelector('iframe.giscus-frame');
      if (iframe && iframe.contentWindow) {
        iframe.contentWindow.postMessage(
          { giscus: { setConfig: { theme: giscusTheme } } },
          "https://giscus.app"
        );
      }
    }

    /* 3. OBSERVER: Watch for changes to the <body> tag's attributes
     * This replaces the "md-theme-change" event listener */
    const observer = new MutationObserver((mutations) => {
      mutations.forEach((mutation) => {
        if (mutation.type === "attributes" && mutation.attributeName === "data-md-color-scheme") {
          console.log("Theme change detected via MutationObserver!");
          syncGiscus();
        }
      });
    });

    // Start observing the body tag
    observer.observe(document.body, { attributes: true });

    /* 4. INITIALIZATION: Sync theme when Giscus finishes loading */
    window.addEventListener('message', (event) => {
      if (event.origin === 'https://giscus.app') {
        // Giscus sends a message when it's ready
        if (event.data && typeof event.data === 'object' && event.data.giscus) {
          syncGiscus(); 
        }
      }
    });
  </script>
{% endif %}
