{% extends "base.html" %}

{% block hero %}
  {% if page.is_homepage %}
    <section class="home-hero">
      
      <!-- 1. SPLIT-FLAP WIDGET (Fixed 20 chars) -->
      <!-- 1. SPLIT-FLAP WIDGET -->
      <div class="split-flap-container">
        <div id="flap-display" class="flap-display">
            <!-- The Title is now inside the black box -->
            <span class="flap-label">SYSTEM STATUS</span>
            
            <!-- This row will hold the characters generated by JS -->
            <div id="flap-row" class="flap-row"></div>
        </div>
      </div>

      <div class="md-hero__inner md-grid">
        <!-- ... (Terminal Frame remains the same) ... -->
        <div class="terminal-window">
          <div class="terminal-header">
            <div class="terminal-buttons">
              <span class="dot red"></span>
              <span class="dot yellow"></span>
              <span class="dot green"></span>
            </div>
            <div class="terminal-title"></div>
          </div>
          <div class="terminal-body">
            <h1 class="hero-title shell-prompt">
              <span class="user">cc</span><span class="at">@</span><span class="host">SCSE_BUAA</span><span class="colon">:</span><span class="path">~</span><span class="char">$ </span><span class="cursor">_</span>
            </h1>
            <p class="hero-subtitle">CS Journey</p>
          </div>
        </div>

        <div class="scroll-indicator">
            <span>Get Started</span>
            <div class="arrow"></div>
        </div>
      </div>

      <!-- The Lighthouse Guide (Image Version) -->
      <div class="lighthouse-guide">
        <div class="lighthouse-wrapper">
          <!-- The rotating beam -->
          <div class="light-beam"></div>
          
          <!-- The pulsing core light -->
          <div class="lantern-glow"></div>
          
          <!-- Your PNG Image -->
          <img src="{{ base_url }}/assets/lighthouse.png" class="lighthouse-img" alt="Lighthouse">
        </div>
      </div>

      <!-- ADD THIS: The Undulating Wave Divider -->
      <div class="hero-wave">
        <svg data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
            <path d="M0,0V46.29c47.79,22.2,103.59,32.17,158,28,70.36-5.37,136.33-33.31,206.8-37.5C438.64,32.43,512.34,53.67,583,72.05c69.27,18,138.3,24.88,209.4,13.08,36.15-6,69.85-17.84,104.45-29.34C989.49,25,1113-14.29,1200,52.47V0Z" opacity=".25" class="shape-fill"></path>
            <path d="M0,0V15.81C13,36.92,27.64,56.86,47.69,72.05,99.41,111.27,165,111,224.58,91.58c31.15-10.15,60.09-26.07,89.67-39.8,40.92-19,84.73-46,130.83-49.67,36.26-2.85,70.9,9.42,98.6,31.56,31.77,25.39,62.32,62,103.63,73,40.44,10.79,81.35-6.69,119.13-24.28s75.16-39,116.92-43.05c59.73-5.85,113.28,22.88,168.9,38.84,30.2,8.66,59,6.17,87.09-7.5,22.43-10.89,48-26.93,60.65-49.24V0Z" opacity=".5" class="shape-fill"></path>
            <!-- <path d="M0,0V5.63C149.93,59,314.09,71.32,475.83,42.57c43-7.64,84.23-20.12,127.61-26.46,59-8.63,112.48,12.24,165.56,35.4C827.93,77.22,886,95.24,951.2,90c86.53-7,172.46-45.71,248.8-84.81V0Z" class="shape-fill"></path> -->
        </svg>
      </div>

      <div class="hero-wave-overlay">
        <svg data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
            <path d="M0,0V5.63C149.93,59,314.09,71.32,475.83,42.57c43-7.64,84.23-20.12,127.61-26.46,59-8.63,112.48,12.24,165.56,35.4C827.93,77.22,886,95.24,951.2,90c86.53-7,172.46-45.71,248.8-84.81V0Z" class="shape-fill"></path>
        </svg>
      </div>

    </section>
  {% endif %}
{% endblock %}

{% block extrahead %}
  {% if page.is_homepage %}
    <style>
      /* --- PREVIOUS STYLES --- */
      .md-content h1 { display: none;}
      .md-main__inner { margin-top: 0;}
      .md-header { z-index: 10; }
      /* Ensure the rest of the site (blog posts/docs) covers the widget when scrolling */
      .md-main {
        position: relative;
        z-index: 5;
        background-color: var(--md-default-bg-color); /* Uses your theme's background color */
      }
      .home-hero {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 85vh;
        padding: 4rem 1rem;
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        position: relative;
      }
      [data-md-color-scheme="default"] .home-hero { background-image: linear-gradient(rgba(0, 0, 0, 0), rgba(0, 0, 0, 0.5)), url('{{ base_url }}/assets/background.png'); }
      [data-md-color-scheme="slate"] .home-hero { background-image: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.7)), url('{{ base_url }}/assets/background.png'); }

      /* --- UPDATED SPLIT-FLAP STYLES --- */
      /* --- SPLIT-FLAP WIDGET --- */
      .split-flap-container {
        position: fixed; 
        top: 80px;
        right: 30px;
        z-index: 0;
      }

      .flap-display {
        background: linear-gradient(rgba(40, 40, 40, 0.95), rgba(25, 25, 25, 0.95));
        padding: 10px 12px; /* Adjust padding to change the "frame" size */
        padding-top: 5px; /* Less top padding to bring title closer to flaps */
        border-radius: 6px;
        border: 1px solid rgba(255,255,255,0.1);
        
        /* Layout: Stack Title on top of Flaps */
        display: flex;
        flex-direction: column;
        align-items: center; /* This centers the title and the row */
        gap: 5px;           /* Space between title and flaps */
        box-shadow: 0 10px 15px rgba(0, 0, 0, 0.65);
      }

      .flap-label {
        font-family: 'Ubuntu Mono', monospace;
        font-size: 0.5rem;       /* Size of the title */
        color: #00ff00;           /* Title Color */
        text-shadow: #00ff00 0px 0px 5px;
        letter-spacing: 0.5px;
        font-weight: bold;
        text-transform: uppercase;
        opacity: 0.9;
      }

      .flap-row {
        display: flex;
        gap: 2px; /* Space between individual characters */
      }

      .flap-char {
        position: relative;
        display: inline-block;
        font-family: 'Ubuntu Mono', monospace;
        /* font-weight: bold; */
        font-size: 1rem;
        width: 1.3ch;
        height: 1.4em;
        line-height: 1.4em;
        text-align: center;
        background: linear-gradient(to bottom, #292929 0%, #1a1a1a 50%, #292929 100%);
        color: #eeeeee;
        border-radius: 3px;
        border: 1px solid rgba(0,0,0,0.4);
      }

      /* Horizontal Split Line */
      .flap-char::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        width: 100%;
        height: 0.7px;
        background: rgba(0, 0, 0, 0.6);
        z-index: 1;
      }

      /* Adjust mobile to keep it from overlapping header */
      @media screen and (max-width: 1024px) {
        .split-flap-container {
          position: absolute; /* On mobile, fixed might take up too much space */
          top: 20px;
          right: 20px;
          scale: 0.8;
        }
      }

      /* --- HANGING SUPPORTS (STALKS) --- */
      /* The sticks themselves */
      .split-flap-container::before,
      .split-flap-container::after {
        content: "";
        position: absolute;
        top: -80px; /* This should match the 'top' value of the container to reach the edge */
        width: 6px;
        height: 85px; /* Slightly longer than the gap to overlap into the box */
        background: linear-gradient(to right, #222, #444, #222); /* Metallic cylinder effect */
        border-radius: 2px;
        z-index: -1; /* Place behind the flap display */
        box-shadow: 2px 0 5px rgba(0,0,0,0.3);
      }

      /* Position the left stick */
      .split-flap-container::before {
        left: 30px;
      }

      /* Position the right stick */
      .split-flap-container::after {
        right: 30px;
      }

      /* Optional: Add "Bolts" where the sticks meet the box for extra detail */
      .flap-display::before,
      .flap-display::after {
        content: "";
        position: absolute;
        top: -3px;
        width: 10px;
        height: 10px;
        background: #111;
        border-radius: 50%;
        border: 1px solid rgba(255,255,255,0.1);
        z-index: 2;
      }
      .flap-display::before { left: 28px; }
      .flap-display::after { right: 28px; }

      /* Responsive adjustment: Adjust stick height for mobile */
      @media screen and (max-width: 1024px) {
        .split-flap-container::before,
        .split-flap-container::after {
          top: -20px; /* Matches the top: 20px in your mobile media query */
          height: 25px;
          width: 4px;
        }
        .flap-display::before { left: 18px; }
        .flap-display::after { right: 18px; }
      }

      /* --- LIGHTHOUSE SWEEP & GLOW --- */
      .lighthouse-guide {
        position: absolute;
        bottom: 25px; 
        left: 16%;
        transform: translateX(-50%);
        z-index: 2;
        pointer-events: none;
        /* Adds depth for the 3D rotation */
        perspective: 1000px;  
      }

      .lighthouse-wrapper {
        position: relative;
        display: inline-block;
        transform-style: preserve-3d;
      }

      .lighthouse-img {
        height: 120px; 
        width: auto;
        display: block;
        z-index: 2;
        position: relative;
        /* Darken the image slightly so the glow pops more */
        filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)) brightness(0.8);
      }

      /* 1. THE SWEEPING BEAM */
      .light-beam {
        position: absolute;
        /* ADJUST TOP/LEFT to match your PNG's lantern center */
        top: 0px; 
        left: 50%; 
        
        /* Stretched size */
        width: 60vw;  /* Long enough to reach screen edges */
        height: 30px; /* Vertical thickness of the beam */
        
        /* Gradient: Fades from white at the lighthouse to transparent at the tip */
        background: linear-gradient(to right, 
          rgba(255, 255, 180, 0) 0%,
          rgba(255, 255, 225, 0.8) 6%, 
          rgba(255, 255, 180, 0.3) 25%, 
          rgba(255, 255, 180, 0) 100%
        );
        
        /* Pivot from the left edge so it stays attached to the lighthouse */
        transform-origin: left center;
        
        /* Softens the beam */
        filter: blur(8px);
        
        /* Initial State */
        z-index: 2;
        
        /* The 360-degree horizontal rotation */
        animation: sweep3D 10s infinite linear;
      }

      /* 2. THE LANTERN ROOM GLOW */
      .lantern-glow {
        position: absolute;
        /* Match the beam's TOP position */
        top: 25px; 
        left: 50%;
        transform: translate(-50%, -50%);
        width: 15px;
        height: 15px;
        background: radial-gradient(circle, #fff 0%, #fff7aa 40%, rgba(255, 247, 170, 0.2) 100%);
        border-radius: 50%;
        z-index: 3;
        box-shadow: 0 0 40px rgba(255, 247, 170, 0.5); 
        
        /* Synchronized with the sweep */
        animation: lanternPulse3D 10s infinite ease-in-out;
      }

      /* ANIMATIONS */

      @keyframes sweep3D {
        /* 0%: Stretched Right (+100% x-axis) */
        0% { 
          transform: rotateY(0deg); 
          opacity: 1;
        }
        12.5% { 
          transform: rotateY(45deg); 
          opacity: 0.5; /* Slight fade as it starts to point at user */
        }
        /* 25%: Pointing at viewer (0% x-axis) */
        25% { 
          transform: rotateY(90deg); 
          opacity: 0; /* Beam vanishes as it points at user */
        }
        37.5% { 
          transform: rotateY(135deg); 
          opacity: 0.5; /* Reappears as it points away */
        }
        /* 50%: Stretched Left (-100% x-axis) */
        50% { 
          transform: rotateY(180deg); 
          opacity: 1;
        }
        62.5% { 
          transform: rotateY(225deg); 
          opacity: 0.5; 
        }
        /* 75%: Pointing away (0% x-axis) */
        75% { 
          transform: rotateY(270deg); 
          opacity: 0; 
        }
        87.5% { 
          transform: rotateY(315deg); 
          opacity: 0.5; 
        }
        100% { 
          transform: rotateY(360deg); 
          opacity: 1;
        }
      }

      @keyframes lanternPulse3D {
        /* Brightest when beam is pointing Center */
        75% { 
          opacity: 1; 
          transform: translate(-50%, -50%) scale(1.2);
          box-shadow: 0 0 80px 40px #fff7aa;
        }
        /* Dimmest when beam is pointing away*/
        25% { 
          opacity: 0.2; 
          transform: translate(-50%, -50%) scale(0.8);
          box-shadow: 0 0 10px rgba(255, 247, 170, 0.2);
        }
        0%, 50%, 100% { 
          opacity: 0.5; 
          transform: translate(-50%, -50%) scale(1);
          box-shadow: 0 0 40px rgba(255, 247, 170, 0.5);
        }
      }

      /* --- RESPONSIVE --- */
      @media screen and (max-width: 1024px) {
        .lighthouse-guide { left: 15%; scale: 0.7; }
        .light-beam { width: 300px; } /* Shorten beam on smaller screens */
      }

      .hero-wave { position: absolute; bottom: 0; left: 0; width: 100%; overflow: hidden; line-height: 0; z-index: 1; transform: rotate(180deg); }
      .hero-wave svg { position: relative; display: block; width: calc(100% + 1.3px); height: 100px; transform: rotateY(180deg); }
      .hero-wave .shape-fill { fill: var(--md-primary-fg-color); }
      .home-hero { overflow: hidden; position: relative; padding-bottom: 100px; }
      @media screen and (max-width: 1024px) { .hero-wave svg { height: 40px; } .hero-nav-bookmark { bottom: 10px; } }
      .hero-wave-overlay { position: absolute; bottom: 0; left: 0; width: 100%; overflow: hidden; line-height: 0; z-index: 3; transform: rotate(180deg); }
      .hero-wave-overlay svg { position: relative; display: block; width: calc(100% + 1.3px); height: 100px; transform: rotateY(180deg); }
      .hero-wave-overlay .shape-fill { fill: var(--md-primary-fg-color); }
      @media screen and (max-width: 1024px) { .hero-wave-overlay svg { height: 40px; } }

      /* ... (Remaining Terminal & Indicator styles from previous prompt) ... */
      .terminal-window { width: 100%; max-width: 1200px; background-color: rgba(20, 20, 20, 0.65); border-radius: 10px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(2px); }
      .terminal-header { background-color: #e0e0e0; padding: 10px 15px; display: flex; align-items: center; position: relative; }
      .terminal-buttons { display: flex; gap: 8px; }
      .dot { width: 12px; height: 12px; border-radius: 50%; }
      .red { background-color: #ff5f56; }
      .yellow { background-color: #ffbd2e; }
      .green { background-color: #27c93f; }
      .terminal-title { position: absolute; width: 100%; text-align: center; left: 0; font-family: 'Ubuntu', monospace; font-size: 0.8rem; font-weight: 600; color: #333; pointer-events: none; }
      .terminal-body { padding: 3rem 5rem 5rem 5rem; text-align: center; }
      .shell-prompt { font-family: 'Ubuntu Mono', monospace !important; font-size: 2.5rem !important; font-weight: 500; margin-bottom: 0.5rem; color: white; }
      .shell-prompt .user { color: #8ae234; }
      .shell-prompt .host { color: #8ae234; }
      .shell-prompt .path { color: #729fcf; }
      .cursor { animation: blink 1s step-end infinite; }
      @keyframes blink { from, to { opacity: 1; } 50% { opacity: 0; } }
      .hero-subtitle { font-family: 'Ubuntu', monospace; font-size: 1.2rem; color: #ccc; margin: 0; }
      .scroll-indicator { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; opacity: 0.6; transition: opacity 0.3s; z-index: 4; }
      .scroll-indicator:hover { opacity: 1; }
      .scroll-indicator span { font-family: 'Ubuntu', monospace; font-size: 0.9rem; color: white; }
      .arrow { width: 20px; height: 20px; border-right: 2px solid white; border-bottom: 2px solid white; transform: rotate(45deg); animation: bounce-arrow 2s infinite; }
      @keyframes bounce-arrow { 0%, 20%, 50%, 80%, 100% { transform: translateY(0) rotate(45deg); } 40% { transform: translateY(-10px) rotate(45deg); } 60% { transform: translateY(-5px) rotate(45deg); } }

      @media screen and (max-width: 1024px) {
        .split-flap-container { position: relative; top: 0; right: 0; margin-bottom: 2rem; align-items: center; }
      }
    </style>
  {% endif %}

  <script>
    // 2. CONFIGURATION: MODIFY TEXTS HERE
    const FLAP_TEXTS = [
      "WELCOME_TO_MY_SITE",
      "BEIHANG_UNIVERSITY",
      "COMPUTER_SCIENCE",
      "UNDERGRADUATE_STUDNT",
      "COFFEE_TO_CODE",
      "    "
    ];
    
    const MAX_LENGTH = 20; // Fixed width
    // The sequence of characters on the "mechanical drum"
    const ALPHABET = " ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_+-@.<>".split("");

    document.addEventListener("DOMContentLoaded", function() {
      const display = document.getElementById('flap-row');
      let currentIndex = 0;

      // Initialize the 20 empty flaps
      const flaps = [];
      for (let i = 0; i < MAX_LENGTH; i++) {
        const span = document.createElement('span');
        span.className = 'flap-char';
        span.innerText = " "; // Initial state: space
        display.appendChild(span);
        flaps.push({
          el: span,
          currentChar: " "
        });
      }

      function updateFlap(targetString) {
        // Right-align: Pad start with spaces to reach MAX_LENGTH
        const paddedTarget = targetString.toUpperCase()
          .slice(0, MAX_LENGTH)
          .padEnd(MAX_LENGTH, " ");

        for (let i = 0; i < MAX_LENGTH; i++) {
          const targetChar = paddedTarget[i];
          const flap = flaps[i];
          
          if (flap.currentChar === targetChar) continue;

          // Realistic rolling logic
          animateDrum(flap, targetChar, i);
        }
      }

      function animateDrum(flap, targetChar, index) {
        let currentIdx = ALPHABET.indexOf(flap.currentChar);
        if (currentIdx === -1) currentIdx = 0;

        const interval = setInterval(() => {
          // Move to next char in alphabet (cyclic)
          currentIdx = (currentIdx + 1) % ALPHABET.length;
          const newChar = ALPHABET[currentIdx];
          
          flap.el.innerText = newChar;
          flap.currentChar = newChar;

          if (newChar === targetChar) {
            clearInterval(interval);
          }
        }, 30 + (index * 2)); // Slightly staggered speed for realism
      }

      // Initial Call
      setTimeout(() => updateFlap(FLAP_TEXTS[0]), 500);

      // Cycle loop
      setInterval(() => {
        currentIndex = (currentIndex + 1) % FLAP_TEXTS.length;
        updateFlap(FLAP_TEXTS[currentIndex]);
      }, 5000); 

      // (Scroll script...)
      const indicator = document.querySelector('.scroll-indicator');
      if (indicator) {
        indicator.onclick = function() {
          const hero = document.querySelector('.home-hero');
          window.scrollTo({ top: hero ? hero.offsetHeight : 0, behavior: 'smooth' });
        };
      }
    });
  </script>
{% endblock %}
